spring:
  datasource:
    url: jdbc:h2:mem:marketplace;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create
    generate-ddl: true
    show-sql: true

  h2:
    console:
      enabled: true
      path: /h2-console

# JWT Configuration
jwt:
  # Base64-encoded 256-bit secret — TROCAR EM PRODUÇÃO
  secret: dGhpc0lzQVN1cGVyU2VjcmV0S2V5Rm9ySldUVG9rZW5TaWduaW5nMTIzNDU2Nzg5MA==
  access-token-expiration-ms: 900000        # 15 minutos
  refresh-token-expiration-ms: 604800000    # 7 dias

management:
  endpoints:
    web:
      exposure:
        include: '*'
  endpoint:
    health:
      show-details: 'always'

server:
  port: 8080
